services:
  mongodb:
    profiles: ["local"]
    image: mongo:8
    container_name: ev-demo-mongodb
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    env_file:
      - .env
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: |
        test $$(mongosh --quiet --eval "try { rs.initiate({_id:'rs0', members:[{_id:0, host:'mongodb:27017'}]}).ok } catch(e) { rs.status().ok }") -eq 1
      interval: 10s
      start_period: 5s

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: ev-demo-simulator
    env_file:
      - .env
    environment:
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-charging_demo}
      SESSION_TELEMETRY_INTERVAL_SECONDS: ${SESSION_TELEMETRY_INTERVAL_SECONDS:-2}
      CHANGE_STREAM_RETRY_SECONDS: ${CHANGE_STREAM_RETRY_SECONDS:-2}
      SIMULATOR_URL: ${SIMULATOR_URL:-http://localhost:8000}
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
        required: false

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ev-demo-backend
    env_file:
      - .env
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://localhost:4000}
      BACKEND_CORS_ORIGIN: ${BACKEND_CORS_ORIGIN:-http://localhost:3000}
      MONGODB_URI: ${MONGODB_URI}
    ports:
      - "4000:4000"
    depends_on:
      mongodb:
        condition: service_healthy
        required: false

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ev-demo-frontend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_GRAPHQL_URL: ${NEXT_PUBLIC_GRAPHQL_URL:-http://localhost:4000/graphql}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongodb-data:
